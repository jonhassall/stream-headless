<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StreamHeadless — Login</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0f0f1a;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: #1a1a2e;
      border: 1px solid #2a2a4a;
      border-radius: 12px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 380px;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.4rem;
      color: #fff;
    }

    .subtitle {
      font-size: 0.85rem;
      color: #888;
      margin-bottom: 2rem;
    }

    label {
      display: block;
      font-size: 0.8rem;
      color: #aaa;
      margin-bottom: 0.4rem;
      margin-top: 1rem;
    }

    input {
      width: 100%;
      padding: 0.65rem 0.9rem;
      background: #0f0f1a;
      border: 1px solid #2a2a4a;
      border-radius: 6px;
      color: #e0e0e0;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.15s;
    }

    input:focus { border-color: #6366f1; }

    button {
      width: 100%;
      margin-top: 1.6rem;
      padding: 0.75rem;
      background: #6366f1;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }

    button:hover { background: #4f52d4; }
    button:disabled { background: #3a3a6a; cursor: not-allowed; }

    .error {
      margin-top: 1rem;
      padding: 0.6rem 0.9rem;
      background: #3a1a1a;
      border: 1px solid #7a2020;
      border-radius: 6px;
      font-size: 0.85rem;
      color: #f87171;
      display: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>StreamHeadless</h1>
    <p class="subtitle">Headless browser streaming to RTMP</p>

    <form id="loginForm">
      <label for="username">Username</label>
      <input id="username" type="text" autocomplete="username" required autofocus>

      <label for="password">Password</label>
      <input id="password" type="password" autocomplete="current-password" required>

      <div class="error" id="errMsg"></div>

      <button type="submit" id="btn">Sign in</button>
    </form>
  </div>

  <script>
    const form = document.getElementById('loginForm');
    const btn  = document.getElementById('btn');
    const err  = document.getElementById('errMsg');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      btn.disabled = true;
      btn.textContent = 'Signing in…';
      err.style.display = 'none';

      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: document.getElementById('username').value,
            password: document.getElementById('password').value,
          }),
        });

        if (res.ok) {
          window.location.href = '/index.html';
        } else {
          const data = await res.json();
          err.textContent = data.error || 'Login failed';
          err.style.display = 'block';
        }
      } catch (_) {
        err.textContent = 'Network error — is the server reachable?';
        err.style.display = 'block';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Sign in';
      }
    });
  </script>
</body>
</html>
