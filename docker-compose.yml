services:
  app:
    build: ./app
    restart: unless-stopped
    env_file: .env
    volumes:
      - data:/data
    shm_size: '256m'
    expose:
      - "3000"
      - "6901"
      - "6902"
      - "6903"

    # ── GPU passthrough — uncomment ONE block to enable hardware encoding ──

    # NVIDIA (h264_nvenc)
    # Requires the NVIDIA Container Toolkit on the host:
    #   https://docs.nvidia.com/datacenter/cloud-native/container-toolkit/install-guide.html
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu, video]

    # Intel / AMD (h264_vaapi via VAAPI)
    # Exposes the DRI render node inside the container.
    devices:
      - /dev/dri:/dev/dri

    # ──────────────────────────────────────────────────────────────────────

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

volumes:
  data:
